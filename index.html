<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بوابة الاستعلام عن العلامات</title>
  <style>
    :root{
      --navy:#0b1f3a;
      --blue:#123e73;
      --gold:#d7a843;
      --gold2:#f4d27b;
      --white:#ffffff;
      --soft:#f4f7fb;
      --danger:#b91c1c;
      --ok:#166534;
      --text:#102033;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: "Tahoma", "Arial", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(244,210,123,.22), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(255,255,255,.14), transparent 28%),
        linear-gradient(135deg, #07182e 0%, #123e73 48%, #07182e 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      color:var(--text);
    }
    .page{
      width:min(920px,100%);
      background:rgba(255,255,255,.96);
      border:1px solid rgba(244,210,123,.45);
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 24px 70px rgba(0,0,0,.30);
      position:relative;
    }
    .top{
      padding:34px 28px 28px;
      color:white;
      text-align:center;
      background:
        linear-gradient(120deg, rgba(11,31,58,.97), rgba(18,62,115,.96)),
        repeating-linear-gradient(45deg, transparent 0 12px, rgba(255,255,255,.04) 12px 14px);
      position:relative;
    }
    .top:after{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:5px;
      background:linear-gradient(90deg, transparent, var(--gold2), var(--gold), var(--gold2), transparent);
    }
    .badge{
      margin:0 auto 14px;
      width:86px;height:86px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      border:3px solid var(--gold2);
      background:linear-gradient(145deg, rgba(244,210,123,.25), rgba(255,255,255,.05));
      box-shadow:0 0 30px rgba(244,210,123,.22);
      font-size:38px;
    }
    h1{margin:0;font-size:32px;letter-spacing:.2px}
    .subtitle{margin:12px auto 0;max-width:720px;line-height:1.8;color:#dce8f7;font-size:16px}
    .content{padding:30px}
    .search-box{
      background:linear-gradient(180deg, #fff, #f7fafc);
      border:1px solid #d9e4ef;
      border-radius:22px;
      padding:24px;
      box-shadow:0 12px 28px rgba(15,35,65,.08);
    }
    label{font-weight:700;color:var(--navy);display:block;margin-bottom:10px;font-size:18px}
    .row{display:flex;gap:12px;align-items:center}
    input{
      flex:1;
      height:56px;
      border:2px solid #d7e2ee;
      border-radius:16px;
      padding:0 18px;
      font-size:22px;
      outline:none;
      text-align:center;
      letter-spacing:2px;
      direction:ltr;
      background:white;
      transition:.2s;
    }
    input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(215,168,67,.18)}
    button{
      height:56px;
      border:0;
      border-radius:16px;
      padding:0 26px;
      font-size:18px;
      font-weight:800;
      color:#102033;
      cursor:pointer;
      background:linear-gradient(135deg, var(--gold2), var(--gold));
      box-shadow:0 10px 18px rgba(215,168,67,.25);
      transition:.2s;
    }
    button:hover{transform:translateY(-1px)}
    .hint{margin-top:12px;color:#5c6b7d;font-size:14px;line-height:1.7}
    .result{
      margin-top:22px;
      min-height:42px;
    }
    .msg{
      padding:16px 18px;border-radius:16px;
      background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;
      font-weight:700;line-height:1.7;
    }
    .student-card{
      border-radius:24px;
      border:1px solid rgba(215,168,67,.45);
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.98));
      box-shadow:0 16px 38px rgba(15,35,65,.12);
      overflow:hidden;
    }
    .student-head{
      display:flex;justify-content:space-between;gap:12px;align-items:center;
      padding:20px 22px;
      background:linear-gradient(120deg, #0b1f3a, #123e73);
      color:white;
    }
    .student-name{font-size:22px;font-weight:900}
    .student-id{font-size:14px;color:#dbeafe;direction:ltr}
    .marks{padding:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .mark-card{
      border-radius:18px;
      background:white;
      border:1px solid #e6eef7;
      padding:18px;
      position:relative;
      overflow:hidden;
    }
    .mark-card:before{
      content:"";
      position:absolute;right:0;top:0;bottom:0;width:6px;
      background:linear-gradient(var(--gold2), var(--gold));
    }
    .subject{font-weight:900;color:var(--navy);font-size:17px;margin-bottom:12px}
    .score{font-size:38px;font-weight:900;color:#0f172a;line-height:1}
    .rating{
      display:inline-block;margin-top:12px;padding:7px 14px;border-radius:999px;
      font-weight:900;font-size:15px;
    }
    .excellent{background:#dcfce7;color:#166534}
    .verygood{background:#dbeafe;color:#1d4ed8}
    .good{background:#fef3c7;color:#92400e}
    .pass{background:#ffedd5;color:#c2410c}
    .weak{background:#fee2e2;color:#b91c1c}
    .missing{background:#f1f5f9;color:#64748b}
    .stamp{
      margin-top:26px;
      text-align:center;
      color:#243b58;
      font-weight:800;
      line-height:1.8;
    }
    .seal{
      display:inline-block;
      margin-top:8px;
      padding:10px 22px;
      border:2px solid var(--gold);
      border-radius:999px;
      color:#7a4f08;
      background:linear-gradient(180deg, #fffaf0, #fff);
      box-shadow:inset 0 0 0 2px rgba(244,210,123,.20);
    }
    footer{
      padding:18px;
      text-align:center;
      background:#f8fafc;
      color:#627083;
      font-size:13px;
      border-top:1px solid #e2e8f0;
    }
    @media(max-width:650px){
      .row{flex-direction:column}
      input,button{width:100%}
      h1{font-size:25px}
      .content{padding:18px}
      .top{padding:26px 18px}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="top">
      <div class="badge">🎓</div>
      <h1>بوابة الاستعلام عن العلامات</h1>
      <p class="subtitle">أدخل رقم الهوية كاملًا للاطلاع على العلامات والتقدير لكل موضوع.</p>
    </section>

    <section class="content">
      <div class="search-box">
        <label for="idInput">رقم الهوية</label>
        <div class="row">
          <input id="idInput" inputmode="numeric" autocomplete="off" placeholder="اكتب رقم الهوية كاملًا" />
          <button onclick="searchStudent()">عرض العلامة</button>
        </div>
        <div class="hint">مهم: يجب كتابة رقم الهوية كاملًا كما هو، ولا تقبل الصفحة البحث برقمين أو جزء من الرقم.</div>
        <div id="result" class="result"></div>
      </div>

      <div class="stamp">
        <div>إعداد وتطوير</div>
        <div class="seal">الأستاذ عبد الحليم الهزيل</div>
      </div>
    </section>
    <footer>جميع الحقوق محفوظة © عبد الحليم الهزيل</footer>
  </main>

<script>
let students = [];

function normalizeDigits(value){
  const map = {'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9',
               '۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
  return String(value || '').replace(/[٠-٩۰-۹]/g, d => map[d]).replace(/\D/g,'');
}

function rating(score){
  const n = Number(score);
  if (Number.isNaN(n)) return {text:'لا توجد علامة', cls:'missing'};
  if (n > 90) return {text:'ممتاز', cls:'excellent'};
  if (n >= 80) return {text:'جيد جدًا', cls:'verygood'};
  if (n >= 70) return {text:'جيد', cls:'good'};
  if (n >= 60) return {text:'مقبول', cls:'pass'};
  return {text:'يحتاج إلى متابعة', cls:'weak'};
}

function showMessage(text){
  document.getElementById('result').innerHTML = `<div class="msg">${text}</div>`;
}

function searchStudent(){
  const input = normalizeDigits(document.getElementById('idInput').value);
  if(!input){
    showMessage('الرجاء كتابة رقم الهوية كاملًا.');
    return;
  }

  const student = students.find(s => normalizeDigits(s.id) === input);
  if(!student){
    showMessage('رقم الهوية غير موجود. تأكد من كتابة الرقم كاملًا وحاول مرة أخرى.');
    return;
  }

  let cards = '';
  Object.entries(student.marks || {}).forEach(([subject, mark]) => {
    const r = rating(mark);
    const scoreText = (mark === null || mark === undefined || mark === '') ? '—' : mark;
    cards += `
      <div class="mark-card">
        <div class="subject">${subject}</div>
        <div class="score">${scoreText}</div>
        <span class="rating ${r.cls}">${r.text}</span>
      </div>
    `;
  });

  document.getElementById('result').innerHTML = `
    <div class="student-card">
      <div class="student-head">
        <div class="student-name">${student.name}</div>
        <div class="student-id">ID: ${student.id}</div>
      </div>
      <div class="marks">${cards}</div>
    </div>
  `;
}

document.getElementById('idInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') searchStudent();
});

fetch('students.json?v=' + Date.now())
  .then(r => {
    if(!r.ok) throw new Error('students.json not found');
    return r.json();
  })
  .then(data => { students = data.students || []; })
  .catch(() => {
    showMessage('لم يتم العثور على ملف students.json. تأكد من رفعه مع index.html في نفس المكان.');
  });
</script>
</body>
</html>
