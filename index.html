<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الاستعلام عن العلامات</title>
  <style>
    :root{--navy:#0f2a44;--gold:#d4af37;--bg:#eef4fb;--card:#ffffff;--green:#159957;--red:#b91c1c;}
    *{box-sizing:border-box} body{margin:0;font-family:"Tahoma","Arial",sans-serif;background:radial-gradient(circle at top,#ffffff 0,#eef4fb 35%,#dfeaf7 100%);min-height:100vh;color:#12263a;}
    .wrap{width:min(920px,94%);margin:0 auto;padding:32px 0;}
    .hero{background:linear-gradient(135deg,var(--navy),#173f67);border-radius:28px;padding:34px 26px;color:white;text-align:center;box-shadow:0 22px 55px rgba(15,42,68,.28);position:relative;overflow:hidden}
    .hero:before{content:"";position:absolute;inset:-60px;background:radial-gradient(circle at 20% 20%,rgba(212,175,55,.34),transparent 28%),radial-gradient(circle at 85% 15%,rgba(255,255,255,.18),transparent 22%);}
    .hero>*{position:relative}.badge{display:inline-block;border:1px solid rgba(212,175,55,.8);color:#ffe89c;padding:8px 18px;border-radius:999px;font-weight:bold;margin-bottom:12px;background:rgba(255,255,255,.08)}
    h1{margin:8px 0 10px;font-size:clamp(28px,5vw,44px)} .subtitle{margin:0;font-size:18px;opacity:.92;line-height:1.8}
    .panel{margin:-34px auto 0;max-width:720px;background:var(--card);border-radius:26px;padding:26px;box-shadow:0 18px 45px rgba(15,42,68,.18);position:relative;border:1px solid rgba(212,175,55,.32)}
    label{font-weight:bold;font-size:17px;display:block;margin-bottom:10px}.inputRow{display:flex;gap:12px;align-items:center}.inputRow input{flex:1;padding:17px 18px;border:2px solid #d9e5f0;border-radius:18px;font-size:20px;text-align:center;letter-spacing:2px;direction:ltr;outline:none}.inputRow input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,175,55,.16)}
    button{border:0;border-radius:18px;background:linear-gradient(135deg,var(--gold),#f5d76e);color:#17233a;font-weight:900;font-size:18px;padding:17px 28px;cursor:pointer;box-shadow:0 9px 20px rgba(212,175,55,.28)}button:hover{transform:translateY(-1px)}
    .hint{font-size:14px;color:#667085;margin:12px 0 0}.result{margin-top:22px}.studentCard{border-radius:22px;border:1px solid #e5edf5;overflow:hidden;background:#fbfdff}.studentHead{padding:18px 20px;background:linear-gradient(135deg,#f8fafc,#edf4fb);display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}.name{font-size:22px;font-weight:900;color:var(--navy)}.id{direction:ltr;color:#475467;font-weight:bold}
    table{width:100%;border-collapse:collapse}th,td{padding:16px;border-bottom:1px solid #e9eef5;text-align:center}th{background:#fff9e6;color:#614b00}.rating{font-weight:900;border-radius:999px;padding:7px 14px;display:inline-block}.excellent{background:#e8fff1;color:#087443}.verygood{background:#e7f0ff;color:#164da8}.good{background:#fff7d6;color:#8a6100}.pass{background:#fff0e5;color:#a94b00}.weak{background:#ffe8e8;color:#b91c1c}.none{background:#f2f4f7;color:#667085}
    .msg{padding:17px 18px;border-radius:18px;font-weight:bold;text-align:center}.error{background:#fff1f2;color:#b42318;border:1px solid #fecdd3}.info{background:#eff6ff;color:#175cd3;border:1px solid #bfdbfe}
    .stamp{margin:28px auto 0;text-align:center;color:var(--navy);font-weight:900}.seal{display:inline-block;border:2px solid var(--gold);border-radius:999px;padding:12px 24px;background:rgba(255,255,255,.7);box-shadow:0 8px 22px rgba(15,42,68,.1)}
    @media(max-width:640px){.inputRow{flex-direction:column}.inputRow input,button{width:100%}th,td{padding:12px 8px;font-size:14px}.panel{padding:18px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="badge">مدرسة رهط الثانوية على اسم الشيخ سلمان الهزيل</div>
      <h1>بوابة الاستعلام عن العلامات</h1>
      <p class="subtitle">أدخل رقم الهوية كاملًا من 9 أرقام لعرض علاماتك بصورة خاصة ومنظمة</p>
    </section>
    <section class="panel">
      <label for="idInput">رقم الهوية</label>
      <div class="inputRow">
        <input id="idInput" type="text" inputmode="numeric" maxlength="9" placeholder="مثال: 123456789" autocomplete="off" />
        <button onclick="searchStudent()">عرض النتيجة</button>
      </div>
      <p class="hint">يجب كتابة رقم الهوية كاملًا، لا تقبل الصفحة رقمين أو أكثر فقط.</p>
      <div id="result" class="result"></div>
    </section>
    <div class="stamp"><span class="seal">إعداد وتطوير الأستاذ عبد الحليم الهزيل</span></div>
  </main>
<script>
let students=[];
fetch('students.json?version=' + Date.now()).then(r=>r.json()).then(data=>{students=data;}).catch(()=>{document.getElementById('result').innerHTML='<div class="msg error">لم يتم تحميل ملف العلامات students.json. تأكد من رفعه بجانب index.html.</div>';});
const input=document.getElementById('idInput');
input.addEventListener('input',()=>{input.value=input.value.replace(/\D/g,'').slice(0,9);});
input.addEventListener('keydown',(e)=>{if(e.key==='Enter')searchStudent();});
function rating(mark){
  if(mark===null || mark===undefined || mark==='') return {text:'لا توجد علامة بعد',cls:'none'};
  const m=Number(mark);
  if(m>=90) return {text:'ممتاز',cls:'excellent'};
  if(m>=80) return {text:'جيد جدًا',cls:'verygood'};
  if(m>=70) return {text:'جيد',cls:'good'};
  if(m>=60) return {text:'مقبول',cls:'pass'};
  return {text:'بحاجة إلى تحسين',cls:'weak'};
}
function searchStudent(){
 const id=input.value.trim(); const result=document.getElementById('result');
 if(!/^\d{9}$/.test(id)){result.innerHTML='<div class="msg info">الرجاء إدخال رقم الهوية كاملًا من 9 أرقام.</div>';return;}
 const st=students.find(s=>String(s.id).trim()===id);
 if(!st){result.innerHTML='<div class="msg error">رقم الهوية غير موجود. تأكد من الرقم وحاول مرة أخرى.</div>';return;}
 const rows=st.marks.map(m=>{const r=rating(m.mark); const mark=(m.mark===null||m.mark===undefined||m.mark==='')?'—':m.mark; return `<tr><td>${m.subject}</td><td><strong>${mark}</strong></td><td><span class="rating ${r.cls}">${r.text}</span></td></tr>`}).join('');
 result.innerHTML=`<div class="studentCard"><div class="studentHead"><div><div class="name">${st.name}</div><div>نتيجتك حسب رقم الهوية</div></div><div class="id">${st.id}</div></div><table><thead><tr><th>المادة</th><th>العلامة</th><th>التقدير</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
</script>
</body>
</html>
