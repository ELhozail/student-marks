<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>نتائج الطلاب</title>
<style>body{font-family:Arial;text-align:center;padding:40px;background:#f4f6f9}input,button{padding:12px;font-size:18px}#result{margin-top:20px;font-size:22px}</style></head>
<body><h1>استعلام عن العلامة</h1><input id="id" placeholder="أدخل رقم الهوية"><button onclick="searchMark()">بحث</button><div id="result"></div>
<script>
let students=[];
fetch('students.json').then(r=>r.json()).then(d=>students=d);
function searchMark(){
const id=document.getElementById('id').value.trim();
const s=students.find(x=>x.id===id);
document.getElementById('result').innerHTML=s?`<b>${s.name}</b><br>العلامة: ${s.mark}`:'لم يتم العثور على الطالب';
}
</script></body></html>
